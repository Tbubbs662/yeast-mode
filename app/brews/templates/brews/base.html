<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YeastMode{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #eee; }
        .navbar { background-color: #f6a623 !important; }
        .navbar-brand, .nav-link { color: #1a1a2e !important; font-weight: bold; }
        .card { background-color: #16213e; border: 1px solid #f6a623; color: #eee; }
        .btn-primary { background-color: #f6a623; border-color: #f6a623; color: #1a1a2e; }
        .btn-primary:hover { background-color: #e09515; border-color: #e09515; color: #1a1a2e; }
        .badge-fermenting { background-color: #17a2b8; }
        .badge-conditioning { background-color: #ffc107; color: #1a1a2e; }
        .badge-ready { background-color: #28a745; }
        .badge-archived { background-color: #6c757d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🍺 YeastMode</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'recipe_list' %}">Recipes</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
